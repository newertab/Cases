<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crates Game</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<h1>Crates</h1>
<div id="moneyDisplay"></div>
</header>

<nav>
<button onclick="showTab('cratesTab')">Crates</button>
<button onclick="showTab('inventoryTab')">Inventory</button>
</nav>

<main>

<section id="cratesTab" class="tab">
<h2>Open Crates</h2>
<div id="crateContainer" class="grid"></div>

<div id="openResult" class="result"></div>
</section>

<section id="inventoryTab" class="tab hidden">
<h2>Inventory</h2>

<div class="controls">
<select id="sortSelect" onchange="renderInventory()">
<option value="value">Sort: Value</option>
<option value="rarity">Sort: Rarity</option>
<option value="name">Sort: Name</option>
</select>

<select id="filterSelect" onchange="renderInventory()">
<option value="all">All</option>
<option value="Common">Common</option>
<option value="Rare">Rare</option>
<option value="Epic">Epic</option>
<option value="Legendary">Legendary</option>
</select>

<button onclick="sellAll()">Sell All</button>
</div>

<ul id="inventoryList"></ul>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
