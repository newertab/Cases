<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cases</title>

<style>

html,body{
margin:0;
height:100%;
font-family:Arial,sans-serif;
color:#eee;
background:radial-gradient(circle at top,#1b2433,#070a0f 70%);
}

/* APP LAYOUT */

.app{
min-height:100vh;
padding:40px;
box-sizing:border-box;
max-width:1600px;
margin:auto;
}

h2{
margin:0 0 15px 0;
font-size:38px;
letter-spacing:1px;
}

h3{margin:12px 0}

.money{
font-size:22px;
margin-bottom:25px;
font-weight:bold;
color:#8cffb3;
}

/* BUTTONS */

button{
background:linear-gradient(145deg,#3a4355,#232a38);
border:none;
color:white;
padding:12px 20px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
font-size:15px;
transition:.15s;
}

button:hover{
transform:translateY(-2px);
background:linear-gradient(145deg,#4c5870,#2e3749);
}

button:disabled{
opacity:.4;
cursor:not-allowed;
transform:none;
}

/* BIG OPEN BUTTON */

#openBtn{
display:block;
margin:35px auto 10px auto;
font-size:22px;
padding:18px 55px;
border-radius:16px;
background:linear-gradient(135deg,#4da6ff,#6e8bff);
box-shadow:0 0 20px #4da6ff66;
}

#openBtn:hover{
box-shadow:0 0 30px #4da6ffaa;
}

/* TABS */

.tabs{
margin-bottom:25px;
}

.tabs span{
background:#202735;
padding:12px 20px;
margin-right:12px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:.15s;
}

.tabs span:hover{
background:#2d3546;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:20px;
}

/* CRATES */

.crate{
background:linear-gradient(145deg,#1b212c,#121721);
border-radius:16px;
padding:22px;
text-align:center;
box-shadow:0 0 10px #00000055;
transition:.18s;
}

.crate:hover{
transform:translateY(-4px);
box-shadow:0 0 18px #000000aa;
}

.crate h3{
font-size:20px;
margin-bottom:6px;
}

/* ITEMS */

.itemBox{
background:#151b25;
border-radius:14px;
padding:16px;
text-align:center;
font-size:16px;
}

.emoji{
font-size:46px;
display:block;
margin-bottom:10px;
}

/* RARITY */

.common{box-shadow:0 0 8px #aaa3;}
.uncommon{box-shadow:0 0 12px #5cff7a88;}
.rare{box-shadow:0 0 16px #4da6ff99;}
.epic{box-shadow:0 0 22px #c05cffaa;}

.legendary{
box-shadow:0 0 12px #ffb347,0 0 28px #ffb347,0 0 45px #ffb347;
animation:legendGlow 1.2s infinite alternate;
}

@keyframes legendGlow{
from{transform:scale(1);}
to{transform:scale(1.05);}
}

/* SPIN AREA */

.spinWrapper{
width:100%;
max-width:1100px;
margin:40px auto;
position:relative;
}

.pointer{
position:absolute;
left:50%;
transform:translateX(-50%);
top:-28px;
font-size:36px;
color:#ffd27a;
}

.spinContainer{
overflow:hidden;
border-radius:16px;
border:2px solid #444;
background:#06080c;
box-shadow:0 0 18px #000 inset;
}

.spinTrack{
display:flex;
}

.spinItem{
width:170px;
margin:8px;
padding:22px;
border-radius:12px;
background:#222936;
text-align:center;
flex-shrink:0;
}

/* BACK BUTTON */

#backBtn{
margin-bottom:10px;
}

/* TITLE */

#crateTitle{
font-size:30px;
text-align:center;
margin-top:10px;
}

.hidden{display:none}

</style>
</head>

<body>

<div class="app">

<h2>Cases</h2>
<div class="money">Money: $<span id="moneyEl">500</span></div>

<div class="tabs">
<span onclick="showTab('cratesTab')">Crates</span>
<span onclick="showTab('inventoryTab')">Inventory</span>
</div>

<div id="cratesTab"></div>

<div id="inventoryTab" class="hidden">
<h3>Inventory</h3>
<div id="inventory" class="grid"></div>
</div>

<div id="openScreen" class="hidden">

<button id="backBtn" onclick="backToCrates()">← Back</button>

<h3 id="crateTitle"></h3>
<div style="text-align:center;font-size:18px;margin-bottom:10px;">
Cost: $<span id="crateCost"></span>
</div>

<h4 style="text-align:center">Items & Chances</h4>
<div id="lootTable" class="grid"></div>

<button id="openBtn" onclick="openCrate()">OPEN</button>

<div class="spinWrapper">
<div class="pointer">▼</div>
<div class="spinContainer">
<div id="spinTrack" class="spinTrack"></div>
</div>
</div>

</div>

</div>

function rollItem(crate){
let r=Math.random()*100
let sum=0
for(let item of crate.items){
sum+=item.chance
if(r<=sum)return item
}
return crate.items[crate.items.length-1]
}

function updateMoney(){moneyEl.textContent=money}

function renderInventory(){
inventory.innerHTML=""
inventoryItems.forEach(i=>{
const d=document.createElement("div")
d.className="itemBox "+i.rarity
d.innerHTML=`<span class="emoji">${i.emoji}</span>$${i.value}`
inventory.appendChild(d)
})
}

function renderCrates(){
cratesTab.innerHTML="<h3>Crates</h3><div class='grid'></div>"
const grid=cratesTab.querySelector(".grid")

crates.forEach((c,i)=>{
const d=document.createElement("div")
d.className="crate"
d.innerHTML=`<h3>${c.name}</h3>
<p>$${c.cost}</p>
<button onclick="selectCrate(${i})">Open</button>`
grid.appendChild(d)
})
}

function showTab(id){
if(opening)return
cratesTab.classList.add("hidden")
inventoryTab.classList.add("hidden")
openScreen.classList.add("hidden")
document.getElementById(id).classList.remove("hidden")
}

function selectCrate(i){
selectedCrate=crates[i]
showTab("openScreen")
crateTitle.textContent=selectedCrate.name
crateCost.textContent=selectedCrate.cost
lootTable.innerHTML=""

selectedCrate.items.forEach(x=>{
const d=document.createElement("div")
d.className="itemBox "+x.rarity
d.innerHTML=`<span class="emoji">${x.emoji}</span>$${x.value}<br>${x.chance}%`
lootTable.appendChild(d)
})
}

function backToCrates(){
if(opening)return
spinTrack.innerHTML=""
spinTrack.style.transform="translateX(0)"
showTab("cratesTab")
}

function openCrate(){

if(opening||money<selectedCrate.cost)return

opening=true
openBtn.disabled=true
backBtn.disabled=true

money-=selectedCrate.cost
updateMoney()

spinTrack.style.transition="none"
spinTrack.style.transform="translateX(0)"
spinTrack.innerHTML=""

spinTrack.offsetHeight

const winner=rollItem(selectedCrate)

const reel=[]
for(let i=0;i<80;i++){
reel.push(selectedCrate.items[Math.floor(Math.random()*selectedCrate.items.length)])
}

const winIndex=60
reel[winIndex]=winner

reel.forEach(item=>{
const div=document.createElement("div")
div.className="spinItem "+item.rarity
div.innerHTML=`<span class="emoji">${item.emoji}</span>$${item.value}`
spinTrack.appendChild(div)
})

const containerWidth=spinTrack.parentElement.clientWidth
const winEl=spinTrack.children[winIndex]
const itemCenter=winEl.offsetLeft+winEl.offsetWidth/2
const target=-(itemCenter-containerWidth/2)

setTimeout(()=>{

spinTrack.style.transition="transform 4.5s cubic-bezier(.08,.6,.2,1)"
spinTrack.style.transform=`translateX(${target}px)`

},20)

setTimeout(()=>{

inventoryItems.push(winner)
renderInventory()

money+=winner.value
updateMoney()

opening=false
openBtn.disabled=false
backBtn.disabled=false

},4500)

}

renderCrates()
renderInventory()
updateMoney()

</script>

</html>
