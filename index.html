<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crates Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>Crates Game</h1>

<h2 id="moneyDisplay">Money: $0</h2>

<!-- NAV -->
<button onclick="showTab('cratesTab')">Crates</button>
<button onclick="showTab('inventoryTab')">Inventory</button>

<hr>

<!-- ================= CRATES TAB ================= -->
<div id="cratesTab">

<h2>Open Crates</h2>
<div id="crateContainer"></div>

</div>

<!-- ================= INVENTORY TAB ================= -->
<div id="inventoryTab" style="display:none;">

<h2>Inventory</h2>

<button onclick="sellAll()">Sell All Items</button>

<ul id="inventoryList"></ul>

</div>

<script>

/* ============================
   SAVE SYSTEM
============================ */

let gameData = JSON.parse(localStorage.getItem("crateGameSave")) || {
    money: 500,
    inventory: []
};

function saveGame() {
    localStorage.setItem("crateGameSave", JSON.stringify(gameData));
}

/* ============================
   ITEMS + CRATES
============================ */

const itemPool = [
    { name: "Common Scrap", value: 5, rarity: "Common" },
    { name: "Metal Plate", value: 15, rarity: "Common" },
    { name: "Silver Gear", value: 40, rarity: "Rare" },
    { name: "Golden Core", value: 120, rarity: "Epic" },
    { name: "Diamond Chip", value: 300, rarity: "Legendary" }
];

const crates = [
    { name: "Wood Crate", cost: 25 },
    { name: "Iron Crate", cost: 50 },
    { name: "Tech Crate", cost: 75 },
    { name: "Industrial Crate", cost: 100 },
    { name: "Military Crate", cost: 150 },
    { name: "Elite Crate", cost: 200 },
    { name: "Crystal Crate", cost: 300 },
    { name: "Quantum Crate", cost: 400 },
    { name: "Void Crate", cost: 600 },
    { name: "Mythic Crate", cost: 1000 }
];

/* ============================
   RANDOM ITEM LOGIC
============================ */

function getRandomItem() {
    const rand = Math.random();

    if (rand < 0.55) return itemPool[0];
    if (rand < 0.80) return itemPool[1];
    if (rand < 0.93) return itemPool[2];
    if (rand < 0.99) return itemPool[3];
    return itemPool[4];
}

/* ============================
   UI UPDATE FUNCTIONS
============================ */

function updateMoney() {
    document.getElementById("moneyDisplay").textContent =
        "Money: $" + gameData.money;
}

function renderCrates() {
    const container = document.getElementById("crateContainer");
    container.innerHTML = "";

    crates.forEach((crate, index) => {
        const btn = document.createElement("button");

        btn.textContent =
            `${crate.name} ($${crate.cost})`;

        btn.onclick = () => openCrate(index);

        container.appendChild(btn);
        container.appendChild(document.createElement("br"));
    });
}

function renderInventory() {
    const list = document.getElementById("inventoryList");
    list.innerHTML = "";

    gameData.inventory.forEach((item, index) => {
        const li = document.createElement("li");

        li.textContent =
            `${item.name} - ${item.rarity} ($${item.value}) `;

        const sellBtn = document.createElement("button");
        sellBtn.textContent = "Sell";
        sellBtn.onclick = () => sellItem(index);

        li.appendChild(sellBtn);
        list.appendChild(li);
    });
}

/* ============================
   GAME ACTIONS
============================ */

function openCrate(index) {
    const crate = crates[index];

    if (gameData.money < crate.cost) {
        alert("Not enough money!");
        return;
    }

    gameData.money -= crate.cost;

    const reward = getRandomItem();
    gameData.inventory.push({...reward});

    alert(`You got: ${reward.name}!`);

    saveGame();
    updateMoney();
    renderInventory();
}

function sellItem(index) {
    const item = gameData.inventory[index];

    gameData.money += item.value;
    gameData.inventory.splice(index, 1);

    saveGame();
    updateMoney();
    renderInventory();
}

function sellAll() {
    let total = 0;

    gameData.inventory.forEach(item => {
        total += item.value;
    });

    gameData.money += total;
    gameData.inventory = [];

    saveGame();
    updateMoney();
    renderInventory();
}

/* ============================
   TAB SYSTEM
============================ */

function showTab(tabId) {
    document.getElementById("cratesTab").style.display = "none";
    document.getElementById("inventoryTab").style.display = "none";

    document.getElementById(tabId).style.display = "block";
}

/* ============================
   INITIAL LOAD
============================ */

updateMoney();
renderCrates();
renderInventory();

</script>

</body>
</html>
