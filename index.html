<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crates</title>

<style>
/* ================= ROOT ================= */
:root{
--bg:#0f1220;
--panel:#181c2f;
--panel2:#212544;
--accent:#4da3ff;
--text:#e6ecff;
--muted:#9aa4c7;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:linear-gradient(180deg,#0b0e1a,#151935);
color:var(--text);
}

h1,h2{margin:0}
button{
background:var(--panel2);
border:none;
color:white;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
transition:.15s;
}
button:hover{background:#2a2f5f}

/* ================= LAYOUT ================= */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#0a0d1c;
border-bottom:1px solid #2a2f55;
}

nav{
display:flex;
gap:10px;
padding:15px;
background:#111530;
}

main{padding:20px}

.panel{
background:var(--panel);
padding:20px;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,.35);
}

.hidden{display:none}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:14px;
}

/* ================= CRATE CARDS ================= */
.crate{
background:var(--panel2);
padding:16px;
border-radius:12px;
text-align:center;
transition:.2s;
}
.crate:hover{transform:translateY(-4px)}

.price{color:var(--muted);font-size:14px}

/* ================= RESULT ================= */
#resultBox{
margin-top:20px;
padding:25px;
text-align:center;
border-radius:12px;
background:#0b0f25;
min-height:70px;
font-size:20px;
}

.spin{
animation:spin .5s ease}
@keyframes spin{
0%{transform:scale(.8);opacity:.2}
50%{transform:scale(1.15)}
</html>
